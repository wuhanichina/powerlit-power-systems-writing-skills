name: Migrate portable PowerLit cache

on:
  push:
    branches:
      - codex/portable-retrieval-evaluation-rules

permissions:
  contents: write

jobs:
  migrate-cache:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Migrate and sanitize cache
        run: |
          python scripts/Migrate-PowerLitCache.py \
            --source .cache/powerlit-index \
            --destination skills/powerlit-power-systems-literature-intelligence/assets/powerlit-index

      - name: Remove legacy cache location
        run: git rm -r .cache/powerlit-index

      - name: Commit migrated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/powerlit-power-systems-literature-intelligence/assets/powerlit-index
          git commit -m "Migrate bundled cache into installable skill assets [skip ci]"
          git push
