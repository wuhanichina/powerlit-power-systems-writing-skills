name: Bundle runtime PowerLit references

on:
  push:
    branches:
      - codex/portable-retrieval-evaluation-rules

permissions:
  contents: write

jobs:
  bundle:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy install-time references
        run: |
          cp evaluation/method-canon/method-canon.json \
            skills/powerlit-power-systems-literature-intelligence/references/method-canon.json
          git rm .github/workflows/bundle-runtime-resources.yml
      - name: Commit bundled references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/powerlit-power-systems-literature-intelligence/references/method-canon.json
          git commit -m "Bundle method canon with literature skill [skip ci]"
          git push
