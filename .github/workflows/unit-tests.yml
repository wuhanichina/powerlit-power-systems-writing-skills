name: Unit tests

on:
  push:
  pull_request:

env:
  PYTHONUTF8: "1"

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Compile Python scripts
        run: >
          python -m py_compile
          skills/powerlit-power-systems-literature-intelligence/scripts/powerlit_index_common.py
          skills/powerlit-power-systems-literature-intelligence/scripts/Build-PowerLitIndex.py
          skills/powerlit-power-systems-literature-intelligence/scripts/Search-PowerLitIndex.py
          skills/powerlit-power-systems-literature-intelligence/scripts/query_analyzer.py
          evaluation/retrieval/run_retrieval_eval.py

      - name: Run pytest
        run: python -m pytest -q
